.loc-badge{
  display:flex;align-items:center;gap:.5rem;padding:.5rem .9rem;
  background:var(--glass);border:1px solid var(--line);border-radius:100px;
  color:rgba(255,255,255,.85);font-size:.8rem;backdrop-filter:blur(12px)
}
.loc-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--leaf-lt);box-shadow:0 0 8px var(--leaf-lt)}

/* layout */
.grid{display:grid;grid-template-columns:340px 1fr;gap:1.25rem}
@media(max-width:860px){.grid{grid-template-columns:1fr}}

/* input panel */
.panel{
  background:var(--glass);border:1px solid var(--line);border-radius:20px;
  padding:1.4rem;backdrop-filter:blur(18px);
  box-shadow:0 8px 40px rgba(0,0,0,.18)
}
.panel h2{
  font-family:'Fraunces',serif;font-weight:600;font-size:.7rem;text-transform:uppercase;
  letter-spacing:.18em;color:rgba(255,255,255,.55);margin-bottom:1.1rem
}
.field{margin-bottom:1.05rem}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:.8rem;color:rgba(255,255,255,.78);margin-bottom:.4rem;font-weight:400}
.field .val{color:var(--sky);font-weight:600}
.field select,.field input[type=number]{
  width:100%;padding:.6rem .75rem;border-radius:11px;
  background:rgba(255,255,255,.94);border:1px solid transparent;
  font-family:'Outfit';font-size:.9rem;color:var(--ink);font-weight:500;
  transition:box-shadow .15s
}
.field select:focus,.field input:focus{outline:none;box-shadow:0 0 0 3px rgba(56,196,232,.5)}
.field input[type=range]{width:100%;accent-color:var(--aqua);margin-top:.15rem}
.range-row{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.45);margin-top:.2rem}

.recalc-note{margin-top:1.2rem;font-size:.72rem;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:.45rem;line-height:1.4}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--leaf-lt);flex-shrink:0}
.pulse.busy{background:var(--gold);animation:blink .7s infinite}
@keyframes blink{50%{opacity:.3}}

/* results */
.results{display:flex;flex-direction:column;gap:1.25rem}

/* hero verdict */
.hero{
  background:var(--glass-solid);border-radius:20px;padding:1.6rem 1.8rem;
  box-shadow:0 8px 40px rgba(0,0,0,.2);position:relative;overflow:hidden
}
.hero::before{
  content:"";position:absolute;top:0;left:0;width:6px;height:100%;
  background:linear-gradient(var(--aqua),var(--leaf))
}
.hero-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.npv-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:600}
.npv-num{font-family:'Fraunces',serif;font-size:clamp(2rem,5vw,3.1rem);font-weight:700;line-height:1;margin-top:.3rem;letter-spacing:-.02em}
.npv-num.pos{color:var(--pos)}.npv-num.neg{color:var(--neg)}
.verdict-chip{
  padding:.55rem 1.3rem;border-radius:100px;font-weight:700;font-size:.95rem;
  display:flex;align-items:center;gap:.5rem
}
.verdict-chip.yes{background:rgba(63,181,107,.15);color:var(--pos)}
.verdict-chip.no{background:rgba(232,93,93,.13);color:var(--neg)}
.verdict-sub{font-size:.75rem;color:var(--muted);font-weight:400;margin-top:.2rem;text-align:right}

/* stat strip */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem}
@media(max-width:620px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--glass-solid);border-radius:15px;padding:.95rem 1.05rem;box-shadow:0 6px 26px rgba(0,0,0,.14)}
.stat .k{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.stat .v{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600;color:var(--ink);margin-top:.25rem;line-height:1}
.stat .u{font-size:.7rem;color:var(--muted);font-weight:400}

/* chart cards */
.card{background:var(--glass-solid);border-radius:18px;padding:1.3rem 1.4rem;box-shadow:0 8px 34px rgba(0,0,0,.16)}
.card h3{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;color:var(--ink);margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem}
.card h3 .tag{font-family:'Outfit';font-size:.66rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* value-in-time line */
.svg-wrap{width:100%;overflow:visible}
.axis-line{stroke:#DCE6E4;stroke-width:1}
.zero-line{stroke:#B4C4C2;stroke-width:1;stroke-dasharray:3 3}
.val-area{fill:url(#valgrad);opacity:.85}
.val-line{fill:none;stroke:var(--teal);stroke-width:2.5}
.val-dot{fill:#fff;stroke:var(--teal);stroke-width:2}
.brk-dot{fill:var(--leaf)}
.axis-txt{font-size:10px;fill:var(--muted);font-family:'Outfit'}

/* waterfall */
.wf-bars{display:flex;flex-direction:column;gap:.45rem}
.wf-row{display:grid;grid-template-columns:130px 1fr 92px;align-items:center;gap:.6rem}
.wf-name{font-size:.78rem;color:var(--ink);font-weight:400;text-align:right}
.wf-name.total{font-weight:700}
.wf-track{position:relative;height:22px;background:#EEF4F3;border-radius:6px;overflow:hidden}
.wf-fill{position:absolute;top:0;height:100%;border-radius:6px}
.wf-fill.pos{background:linear-gradient(90deg,var(--leaf),var(--leaf-lt))}
.wf-fill.neg{background:#F3B0B0}
.wf-fill.total{background:linear-gradient(90deg,var(--teal),var(--aqua))}
.wf-val{font-size:.76rem;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.wf-val.pos{color:var(--pos)}.wf-val.neg{color:var(--neg)}

.err{background:rgba(232,93,93,.16);border:1px solid var(--neg);color:#fff;padding:.85rem 1.1rem;border-radius:12px;font-size:.85rem;margin-bottom:1rem}
.loading-veil{opacity:.5;transition:opacity .2s;pointer-events:none}
.foot{text-align:center;color:rgba(255,255,255,.4);font-size:.74rem;margin-top:2rem;line-height:1.6}
.foot a{color:rgba(255,255,255,.6);text-decoration:none}
</style>

<body>
<div class="backdrop"></div>
<div class="shell"><div class="content" id="app"></div></div>

<script>
const API_BASE = 'https://aquaponics-backend.onrender.com';
const { createApp, reactive, ref, computed, watch, onMounted } = Vue;

createApp({
  setup(){
    const opts = reactive({greens:[],fish:[],regions:[]});
    const inp = reactive({
      chosen_green:'Lettuce', chosen_fish:'Tilapia', total_area:1000,
      equity:10000, cost_of_equity:0.171, debt_interest_rate:0.1186, region:'South America'
    });
    const res = ref(null);
    const busy = ref(false);
    const err = ref(null);
    let timer = null;

    const money = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(v);
    const moneyK = v => Math.abs(v)>=1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0);

    async function loadOptions(){
      try{
        const r = await fetch(API_BASE+'/options');
        const d = await r.json();
        opts.greens=d.greens; opts.fish=d.fish; opts.regions=d.regions;
        Object.assign(inp, d.defaults);
        calc();
      }catch(e){ err.value='Could not reach the calculation service. '+e.message; }
    }

    async function calc(){
      busy.value=true; err.value=null;
      try{
        const r = await fetch(API_BASE+'/calculate',{
          method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(inp)
        });
        if(!r.ok){const b=await r.json();throw new Error(b.detail||r.statusText);}
        res.value = await r.json();
      }catch(e){ err.value=e.message+' (First request may take ~30s while the server wakes up.)'; }
      finally{ busy.value=false; }
    }

    function debouncedCalc(){ clearTimeout(timer); timer=setTimeout(calc, 350); }
    watch(inp, debouncedCalc, {deep:true});
    onMounted(loadOptions);

    // value-in-time path builder
    const valPath = computed(()=>{
      if(!res.value) return null;
      const acc = res.value.accumulated_value;
      const W=560,H=180,pad=28;
      const min=Math.min(...acc,0),max=Math.max(...acc,0);
      const span=(max-min)||1;
      const x=i=>pad+(i/(acc.length-1))*(W-pad*2);
      const y=v=>H-pad-((v-min)/span)*(H-pad*2);
      const line=acc.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
      const area=line+' L'+x(acc.length-1).toFixed(1)+' '+(H-pad)+' L'+x(0).toFixed(1)+' '+(H-pad)+' Z';
      const zeroY=y(0);
      const pts=acc.map((v,i)=>({x:x(i),y:y(v),v,i}));
      // breakeven crossing
      let brk=null;
      for(let i=1;i<acc.length;i++){ if(acc[i-1]<0&&acc[i]>=0){const f=-acc[i-1]/(acc[i]-acc[i-1]);brk={x:x(i-1)+f*(x(i)-x(i-1)),y:zeroY,yr:(i-1+f)};break;} }
      return {W,H,line,area,zeroY,pts,brk};
    });

    const wfMax = computed(()=> res.value ? Math.max(...Object.values(res.value.waterfall).map(Math.abs)) : 1);

    return {opts,inp,res,busy,err,money,moneyK,valPath,wfMax,calc};
  },

        <div class="brand-txt">
          <h1>Investment Dashboard</h1>
          <p>Model your aquaponics venture in real time</p>
        </div>
      </div>
      <div class="head-spacer"></div>
      <div class="loc-badge"><span class="dot"></span> Votuporanga · São Paulo, Brazil</div>
    </div>

    <div v-if="err" class="err">{{ err }}</div>

    <div class="grid">
      <!-- INPUTS -->
      <div class="panel">
        <h2>Your Venture</h2>

        <div class="field">
          <label>Crop</label>
          <select v-model="inp.chosen_green">
            <option v-for="g in opts.greens" :key="g" :value="g">{{ g }}</option>
          </select>
        </div>
        <div class="field">
          <label>Fish</label>
          <select v-model="inp.chosen_fish">
            <option v-for="f in opts.fish" :key="f" :value="f">{{ f }}</option>
          </select>
        </div>
        <div class="field">
          <label>Region <span class="val">{{ inp.region }}</span></label>
          <select v-model="inp.region">
            <option v-for="r in opts.regions" :key="r" :value="r">{{ r }}</option>
          </select>
        </div>
        <div class="field">
          <label>Total area <span class="val">{{ inp.total_area.toLocaleString() }} m²</span></label>
          <input type="range" min="100" max="5000" step="50" v-model.number="inp.total_area"/>
          <div class="range-row"><span>100</span><span>5,000 m²</span></div>
        </div>
        <div class="field">
          <label>Equity you invest <span class="val">{{ money(inp.equity) }}</span></label>
          <input type="range" min="0" max="300000" step="5000" v-model.number="inp.equity"/>
          <div class="range-row"><span>\$0</span><span>\$300k</span></div>
        </div>
        <div class="field">
          <label>Cost of equity <span class="val">{{ (inp.cost_of_equity*100).toFixed(1) }}%</span></label>
          <input type="range" min="0" max="0.4" step="0.005" v-model.number="inp.cost_of_equity"/>
          <div class="range-row"><span>0%</span><span>40%</span></div>
        </div>
        <div class="field">
          <label>Debt interest rate <span class="val">{{ (inp.debt_interest_rate*100).toFixed(1) }}%</span></label>
          <input type="range" min="0" max="0.4" step="0.005" v-model.number="inp.debt_interest_rate"/>
          <div class="range-row"><span>0%</span><span>40%</span></div>
        </div>

        <div class="recalc-note">
          <span class="pulse" :class="{busy}"></span>
          <span>{{ busy ? 'Recalculating…' : 'Results update automatically as you adjust.' }}</span>
        </div>
      </div>

      <!-- RESULTS -->
      <div class="results" v-if="res">
        <div class="hero">
          <div class="hero-row">
            <div>
              <div class="npv-label">Net Present Value · 10 years</div>
              <div class="npv-num" :class="res.npv>=0?'pos':'neg'">{{ money(res.npv) }}</div>
            </div>
            <div>
              <div class="verdict-chip" :class="res.verdict==='YES'?'yes':'no'">
                {{ res.verdict==='YES' ? '✓ Commercially viable' : '✕ Not yet viable' }}
              </div>
              <div class="verdict-sub" v-if="res.payback_years">Payback ≈ {{ res.payback_years.toFixed(1) }} years</div>
              <div class="verdict-sub" v-else>No payback within 10 years</div>
            </div>
          </div>
        </div>

        <div class="stats">
          <div class="stat"><div class="k">Total Investment</div><div class="v">{{ money(res.total_investment) }}</div></div>
          <div class="stat"><div class="k">Gross Revenue</div><div class="v">{{ money(res.gross_revenue) }}</div><div class="u">per year, steady</div></div>
          <div class="stat"><div class="k">Cost of Capital</div><div class="v">{{ (res.wacc*100).toFixed(1) }}<span class="u">%</span></div><div class="u">WACC</div></div>
          <div class="stat"><div class="k">Energy + Water</div><div class="v">{{ money(res.waterfall['Energy Costs']*-1 + res.waterfall['Water Costs']*-1) }}</div><div class="u">climate-driven /yr</div></div>
        </div>

        <div class="card">
          <h3>Accumulated value over time <span class="tag">discounted, cumulative</span></h3>
          <svg v-if="valPath" class="svg-wrap" :viewBox="'0 0 '+valPath.W+' '+valPath.H" preserveAspectRatio="xMidYMid meet">
            <defs><linearGradient id="valgrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#17B0C4" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#17B0C4" stop-opacity="0.02"/>
            </linearGradient></defs>
            <line class="zero-line" :x1="28" :y1="valPath.zeroY" :x2="valPath.W-28" :y2="valPath.zeroY"/>
            <path class="val-area" :d="valPath.area"/>
            <path class="val-line" :d="valPath.line"/>
            <g v-for="p in valPath.pts" :key="p.i">
              <circle class="val-dot" :cx="p.x" :cy="p.y" r="3"/>
              <text v-if="p.i%2===0" class="axis-txt" :x="p.x" :y="valPath.H-8" text-anchor="middle">Y{{p.i}}</text>
            </g>
            <g v-if="valPath.brk">
              <circle class="brk-dot" :cx="valPath.brk.x" :cy="valPath.brk.y" r="5"/>
              <text class="axis-txt" :x="valPath.brk.x" :y="valPath.brk.y-10" text-anchor="middle" style="fill:#4FB84E;font-weight:600">breakeven</text>
            </g>
          </svg>
        </div>

        <div class="card">
          <h3>Where the money goes <span class="tag">year 10, per year</span></h3>
          <div class="wf-bars">
            <div class="wf-row" v-for="(v,k) in res.waterfall" :key="k">
              <div class="wf-name" :class="{total:k==='Free Cash Flow'}">{{ k }}</div>
              <div class="wf-track">
                <div class="wf-fill" :class="k==='Free Cash Flow'?'total':(v>=0?'pos':'neg')"
                     :style="{width:(Math.abs(v)/wfMax*100)+'%', left:'0'}"></div>
              </div>
              <div class="wf-val" :class="v>=0?'pos':'neg'">{{ money(v) }}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="results" v-else>
        <div class="hero"><div class="npv-label">Loading your model…</div></div>
      </div>
    </div>

    <div class="foot">
      Powered by your live aquaponics model · <a href="https://aquaponics.dev">aquaponics.dev</a><br/>
      Climate data: Open-Meteo ERA5 historical weather
    </div>
  </div>
  `
}).mount('#app');
</script>
</body>
</html>
